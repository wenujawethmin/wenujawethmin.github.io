<!DOCTYPE html>
<html>

<head>
    <title>Simple Search</title>
</head>

<body>

    <h2>Movie Search</h2>

    <input type="text" id="searchBox" placeholder="Search for a movie...">

    <br><br>

    <ul id="movieList">
        <li><a href = "moviesubweb\Avatar (2009)\Avatar (2009).html" target = "_blank">Avatar (2009)</a></li>
        <li><a href = "moviesubweb\Titanic (1997)\Titanic (1997).html" target = "_blank">Titanic</a></li>
        <li>Interstellar</li>
        <li>Inception</li>
        <li>The Batman</li>
        <li>Iron Man</li>
        <li>Spider-Man</li>
        <li>The Matrix</li>
        <li>Forrest Gump</li>
    </ul>

    <script>

        let searchBox = document.getElementById("searchBox");

        searchBox.addEventListener("input", function () {

            let searchText = searchBox.value.toLowerCase();

            let movies = document.querySelectorAll("#movieList li");

            movies.forEach(function (movie) {

                let movieName = movie.textContent.toLowerCase();

                if (movieName.includes(searchText)) {
                    movie.style.display = "list-item";
                }
                else {
                    movie.style.display = "none";
                }

            });

        });

    </script>

</body>

</html>
